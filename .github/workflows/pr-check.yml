name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  audit-and-build:
    name: Audit, test & build check
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Run unit & integration tests
        run: npm test

      - name: Build data (no LLM / no YouTube API)
        run: npm run build:data
        env:
          OLLAMA_HOST: ''   # skip AI summaries — not needed for a PR build check

      - name: Build app
        run: npm run build:app

