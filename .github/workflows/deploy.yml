name: Deploy

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:          # manual trigger from GitHub UI
  push:
    branches: [main]          # deploy on any code change to main
    paths-ignore:
      - '**.md'               # skip docs-only changes
      - '.github/workflows/pr-check.yml'

permissions:
  contents: write             # needed to commit cache + push to Pages

jobs:
  # ── Unit + integration tests ─────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit & integration tests
        run: npm test

  # ── Main build + deploy ───────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test                 # ← blocks deploy if tests fail
    # Serialize builds so concurrent triggers never conflict on the data commit.
    # cancel-in-progress: false → new runs queue rather than cancel the active one.
    concurrency:
      group: build-and-deploy
      cancel-in-progress: false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Cache Ollama model ────────────────────────────────────────────────
      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-llama3.1-8b
          restore-keys: |
            ollama-llama3.1-8b

      # ── Install & start Ollama ───────────────────────────────────────────
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama service
        run: |
          # The install script may have already started Ollama as a systemd
          # service.  Kill any running instance first to avoid the
          # "address already in use" port conflict on 127.0.0.1:11434.
          sudo pkill -f "ollama" || true
          sleep 1
          ollama serve &>/dev/null &

      - name: Wait for Ollama to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://127.0.0.1:11434/api/tags && break
            echo "Waiting for Ollama... ($i)"
            sleep 2
          done

      - name: Pull model
        run: ollama pull ${{ vars.OLLAMA_MODEL || 'llama3.2:1b' }}

      # ── Build feed with LLM classification ──────────────────────────────
      - name: Build feed data
        env:
          USE_LLM: '1'
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL || 'llama3.2:1b' }}
        run: node scripts/generate-version.mjs && node scripts/build-feed.mjs

      # ── Build video feed (YouTube Atom RSS) ──────────────────────────────
      - name: Build video feed
        run: node scripts/build-videos.mjs
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Generate sitemap & SEO content
        run: node scripts/generate-sitemap.mjs && node scripts/generate-seo-content.mjs

      # ── Commit updated AI cache back to repo ────────────────────────────
      - name: Commit updated data & AI cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Explicitly rewrite the remote URL to use the built-in GITHUB_TOKEN.
          # This overrides any PAT that may be stored in a credential helper
          # (e.g. the gh CLI's GH_TOKEN env var) so the push is always
          # authenticated as github-actions[bot], not a personal account.
          git remote set-url origin \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          # Incorporate any remote changes that landed while this job was running,
          # preferring our freshly generated files on conflict (-X ours).
          git fetch origin main
          git merge -X ours --no-edit origin/main
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: refresh feed + videos + update AI classification cache [skip ci]"
          git push origin HEAD:main

      # ── Build & deploy to GitHub Pages ──────────────────────────────────
      - name: Build Vite app
        run: npm run build:app

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: GameBeeper.gg

  # ── E2E smoke tests ───────────────────────────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    needs: build                # runs after the app is built + deployed
    # Only run E2E on the main branch to avoid hammering preview deploys
    if: github.ref == 'refs/heads/main'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Wait for GitHub Pages to propagate before running E2E tests
      - name: Wait for Pages deployment to propagate
        run: sleep 30

      - name: Run E2E smoke tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
