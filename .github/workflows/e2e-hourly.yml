name: E2E Hourly Health Check

on:
  schedule:
    # Run every hour at :05 past the hour
    - cron: '5 * * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Node.js
      # ------------------------------------------------------------------ #
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ------------------------------------------------------------------ #
      # 3. Install dependencies
      # ------------------------------------------------------------------ #
      - name: Install npm dependencies
        run: npm ci

      # ------------------------------------------------------------------ #
      # 4. Install Playwright browsers (all three, matches config)
      # ------------------------------------------------------------------ #
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      # ------------------------------------------------------------------ #
      # 5. Run functional E2E tests (smoke + feature specs, no visual)
      # ------------------------------------------------------------------ #
      - name: Run Playwright functional E2E tests
        id: e2e
        run: npx playwright test --project=chromium --project=firefox --project=webkit --project=mobile-chrome --project=mobile-safari
        env:
          CI: 'true'

      # ------------------------------------------------------------------ #
      # 5b. Run visual regression tests (Chromium only)
      #     Pass --update-snapshots on the first run to seed baselines.
      # ------------------------------------------------------------------ #
      - name: Run visual regression tests
        id: visual
        run: npx playwright test --project=visual
        env:
          CI: 'true'
        continue-on-error: true   # visual diffs are advisory; don't block alert email

      # ------------------------------------------------------------------ #
      # 6. Upload Playwright HTML report as artifact (always, even on fail)
      # ------------------------------------------------------------------ #
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

      # ------------------------------------------------------------------ #
      # 7. Send failure email via SendGrid
      #    Requires secret SENDGRID_API_KEY set in repo Settings → Secrets.
      #    Optionally override ALERT_EMAIL_FROM / ALERT_EMAIL_TO.
      # ------------------------------------------------------------------ #
      - name: Send failure email
        if: failure()
        uses: fjogeleit/http-request-action@v1
        with:
          url: 'https://api.sendgrid.com/v3/mail/send'
          method: 'POST'
          customHeaders: |
            {
              "Authorization": "Bearer ${{ secrets.SENDGRID_API_KEY }}",
              "Content-Type": "application/json"
            }
          data: |
            {
              "personalizations": [{
                "to": [{"email": "${{ secrets.ALERT_EMAIL_TO || 'maintainer@gamebeeper.gg' }}"}]
              }],
              "from": {"email": "${{ secrets.ALERT_EMAIL_FROM || 'alerts@gamebeeper.gg' }}", "name": "GameBeeper CI"},
              "subject": "🚨 GameBeeper E2E tests FAILED — ${{ github.run_id }}",
              "content": [{
                "type": "text/html",
                "value": "<h2>GameBeeper Hourly E2E Check Failed</h2><p><strong>Run:</strong> <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View on GitHub Actions</a></p><p><strong>Branch:</strong> ${{ github.ref_name }}</p><p><strong>Triggered at:</strong> ${{ github.event.head_commit.timestamp }}</p><p>One or more Playwright end-to-end tests failed. Please check the linked run for details and the attached HTML report artifact.</p><hr><p style=\"font-size:12px;color:#666\">This message was sent automatically by the GameBeeper CI pipeline.</p>"
              }]
            }

